name: ci
# Progressive CI for team projects. Safe on any stack: every step is guarded, so a
# fresh repo stays GREEN until you add the matching script/deps — then the check
# starts enforcing. No wall of red on day one.
#
# Enforcement is controlled by BRANCH PROTECTION, not this file:
#   ch-6  -> check runs, NOT required (advisory)
#   ch-8  -> mark the `ci` check "required" in the ruleset (blocks merge on red)
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Kill superseded runs on the same branch/PR (saves Actions minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest      # never windows/macos — they bill 2x / 10x
    timeout-minutes: 15
    steps:
      # CHANGED: Pinned actions/checkout to full SHA for supply-chain security
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # ---------- Frontend (React / Vite) ----------
      # CHANGED: hashFiles now points to frontend/package.json
      # CHANGED: Added cache-dependency-path for frontend lockfile
      - name: Setup Node (frontend)
        if: ${{ hashFiles('frontend/package.json') != '' }}
        # CHANGED: Pinned actions/setup-node to full SHA
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install (frontend)
        if: ${{ hashFiles('frontend/package.json') != '' }}
        # npm ci is reproducible but needs a lockfile; fall back to npm install so a
        # first-push repo without package-lock.json still goes green.
        # CHANGED: Run from frontend/ directory
        run: cd frontend && npm ci
      - name: Lint (frontend)
        if: ${{ hashFiles('frontend/package.json') != '' }}
        # CHANGED: Run oxlint from frontend/ directory
        run: cd frontend && npm run lint
      - name: Build (frontend)
        if: ${{ hashFiles('frontend/package.json') != '' }}
        # CHANGED: Run vite build from frontend/ directory
        run: cd frontend && npm run build

      # ---------- Backend (Python / FastAPI) ----------
      # CHANGED: hashFiles now points to backend/requirements.txt only
      - name: Setup Python
        if: ${{ hashFiles('backend/requirements.txt') != '' }}
        # CHANGED: Pinned actions/setup-python to full SHA
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install (Python)
        if: ${{ hashFiles('backend/requirements.txt') != '' }}
        run: |
          python -m pip install --upgrade pip
          [ -f backend/requirements.txt ] && pip install -r backend/requirements.txt || true
          pip install ruff pytest
      - name: Lint (ruff)
        if: ${{ hashFiles('backend/requirements.txt') != '' }}
        run: ruff check . || true    # ch-8: drop `|| true` to enforce
      - name: Test (pytest)
        if: ${{ hashFiles('backend/requirements.txt') != '' }}
        # CHANGED: Added env var for tests, pointed to backend/tests/ directory
        env:
          ARGUS_KEY_TEST: test_key_for_ci
        run: pytest backend/tests/ -q || true       # ch-8: drop `|| true` to enforce

      # ---------- Docker Build Test (frontend) ----------
      - name: Build Docker image (frontend)
        if: ${{ hashFiles('frontend/Dockerfile') != '' }}
        run: |
          cd frontend
          docker build \
            --build-arg VITE_API_URL=https://argus-scanner.duckdns.org \
            -t argus-frontend:ci-test \
            .

      # ---------- Docker Build Test (backend) ----------
      - name: Build Docker image (backend)
        if: ${{ hashFiles('backend/Dockerfile') != '' }}
        run: |
          cd backend
          docker build -t argus-backend:ci-test .
