name: cd

# Continuous Deployment for frontend — builds Docker image, pushes to Docker Hub,
# and deploys to VPS when frontend files change on main.
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME  — Docker Hub username (kpzik)
#   DOCKERHUB_TOKEN     — Docker Hub access token (not password)
#   VPS_SSH_KEY         — SSH private key for VPS
#   VPS_HOST            — VPS IP address
#   VPS_USER            — SSH username (e.g., root)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/cd.yml"
  workflow_dispatch:

concurrency:
  group: cd-frontend
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-push:
    name: build and push frontend image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2

      - name: Login to Docker Hub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1
        with:
          context: frontend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/argus-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/argus-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=https://argus-scanner.duckdns.org
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0eaed49e668b6f2e3ee4abd8dde9e677905e2b40
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== Pulling latest frontend image ==="
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/argus-frontend:latest

            echo "=== Stopping old container ==="
            docker stop argus-frontend || true
            docker rm argus-frontend || true

            echo "=== Starting new container ==="
            docker run -d \
              --name argus-frontend \
              --network argus_net \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/argus-frontend:latest

            echo "=== Deployment complete ==="
            docker ps --filter name=argus-frontend
