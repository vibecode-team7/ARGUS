server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback - React Router handles routing client-side, so any
    # path that isn't a real file (e.g. /hosts/dev-machine-01) must
    # still serve index.html rather than 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        add_header Content-Type text/plain;
        return 200 "ok";
    }
}
